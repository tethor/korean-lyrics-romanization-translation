<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Pop Auto Translator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .korean-font { font-family: 'Noto Sans KR', sans-serif; }
        .loader {
            border: 3px solid #f3f3f3; border-top: 3px solid #6366f1; border-radius: 50%;
            width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-200 min-h-screen">

    <div class="container mx-auto p-4 max-w-5xl">
        
        <header class="py-8 text-center">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-pink-500">
                K-Pop Auto Romanizer & Translate
            </h1>
            <p class="text-slate-400 text-sm mt-2">Pega el Hangul, nosotros hacemos el resto.</p>
        </header>

        <div class="bg-slate-800 rounded-xl p-6 shadow-2xl border border-slate-700 mb-6">
            <label class="block text-indigo-400 font-bold mb-2">1. Pega la letra en Coreano (Hangul):</label>
            <textarea id="koreanInput" class="w-full h-32 bg-slate-900 border border-slate-700 rounded-lg p-4 text-white focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none korean-font" placeholder="Ejemplo: 안녕하세요..."></textarea>
            
            <div class="mt-4 flex gap-3">
                <button onclick="processLyrics()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-bold transition flex items-center gap-2">
                    <span id="btnText">🚀 Convertir y Traducir</span>
                </button>
                <button onclick="clearAll()" class="bg-slate-700 hover:bg-slate-600 text-slate-300 px-6 py-2 rounded-lg transition">
                    Limpiar
                </button>
            </div>
            <p id="statusMsg" class="text-xs text-slate-500 mt-2 hidden">Procesando traducción...</p>
        </div>

        <div id="outputArea" class="hidden space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 px-4 text-xs font-bold uppercase text-slate-500 tracking-wider">
                <div>Original (Hangul)</div>
                <div>Romanización</div>
                <div>Traducción (Inglés)</div>
            </div>

            <div id="lyricsContainer" class="space-y-2">
                </div>
        </div>

    </div>

    <script>
        // --- LÓGICA DE ROMANIZACIÓN (Hangul Jamo Decomposition) ---
        function romanizeHangul(text) {
            const initialJamo = ["g", "kk", "n", "d", "tt", "r", "m", "b", "pp", "s", "ss", "", "j", "jj", "ch", "k", "t", "p", "h"];
            const medialJamo = ["a", "ae", "ya", "yae", "eo", "e", "yeo", "ye", "o", "wa", "wae", "oe", "yo", "u", "wo", "we", "wi", "yu", "eu", "ui", "i"];
            const finalJamo = ["", "g", "kk", "gs", "n", "nj", "nh", "d", "l", "lg", "lm", "lb", "ls", "lt", "lp", "lh", "m", "b", "bs", "s", "ss", "ng", "j", "ch", "k", "t", "p", "h"];

            let result = "";
            for (let i = 0; i < text.length; i++) {
                const charCode = text.charCodeAt(i);
                // Checar si es un caracter Hangul completo (AC00-D7A3)
                if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                    const offset = charCode - 0xAC00;
                    const finalIdx = offset % 28;
                    const medialIdx = ((offset - finalIdx) / 28) % 21;
                    const initialIdx = (((offset - finalIdx) / 28) - medialIdx) / 21;

                    result += initialJamo[initialIdx] + medialJamo[medialIdx] + finalJamo[finalIdx];
                } else {
                    result += text[i]; // Dejar espacios y puntuación igual
                }
            }
            return result;
        }

        // --- LÓGICA PRINCIPAL ---
        async function processLyrics() {
            const koreanText = document.getElementById('koreanInput').value.trim();
            if (!koreanText) return alert("Por favor pega algo de texto primero.");

            // UI Feedback
            const btn = document.querySelector('button span');
            const status = document.getElementById('statusMsg');
            btn.innerHTML = '<span class="loader"></span> Procesando...';
            status.classList.remove('hidden');
            
            const lines = koreanText.split('\n');
            const container = document.getElementById('lyricsContainer');
            container.innerHTML = ''; // Limpiar anterior

            // 1. Romanizar todo localmente (Instantáneo)
            const romanizedLines = lines.map(line => romanizeHangul(line));

            // 2. Traducir usando MyMemory API
            // Nota: Para evitar bloqueos, enviamos todo el bloque junto si es corto,
            // o línea por línea. Aquí haremos línea por línea para mantener el orden visual.
            // Para producción real, se debería usar una API de pago (Google Cloud / DeepL).
            
            const translatedLines = await translateLines(lines);

            // 3. Renderizar
            lines.forEach((line, index) => {
                if(line.trim() === "") return; // Saltar líneas vacías

                const row = document.createElement('div');
                row.className = "grid grid-cols-1 md:grid-cols-3 gap-4 bg-slate-800 p-4 rounded-lg border border-slate-700 hover:border-indigo-500 transition-colors";
                
                row.innerHTML = `
                    <div class="korean-font text-lg text-white font-medium">${line}</div>
                    <div class="text-indigo-300 font-mono text-sm pt-1">${romanizedLines[index]}</div>
                    <div class="text-slate-400 text-sm italic pt-1">${translatedLines[index] || "..."}</div>
                `;
                container.appendChild(row);
            });

            document.getElementById('outputArea').classList.remove('hidden');
            
            // Restaurar UI
            btn.innerHTML = '🚀 Convertir y Traducir';
            status.classList.add('hidden');
        }

        // Función para traducir usando API gratuita
        async function translateLines(lines) {
            // Unimos las líneas con un separador especial para hacer UNA sola petición (más rápido)
            // MyMemory tiene limite de 500 chars por request aprox en free tier.
            // Aquí haremos un loop simple.
            
            let translations = [];
            
            // Procesamos en lotes pequeños o línea por línea (lento pero seguro)
            // Para este demo, traduciremos línea por línea con un pequeño delay para no saturar la API.
            
            const promises = lines.map(async (line) => {
                if(!line.trim()) return "";
                try {
                    // codificar URL
                    const encodedText = encodeURIComponent(line);
                    const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodedText}&langpair=ko|en`);
                    const data = await response.json();
                    return data.responseData.translatedText;
                } catch (e) {
                    console.error("Error traduciendo:", e);
                    return "Error API";
                }
            });

            return Promise.all(promises);
        }

        function clearAll() {
            document.getElementById('koreanInput').value = '';
            document.getElementById('lyricsContainer').innerHTML = '';
            document.getElementById('outputArea').classList.add('hidden');
        }
    </script>
</body>
</html>
